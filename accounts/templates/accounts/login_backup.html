{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-4">

        <div class="card shadow-sm border-0">
            <div class="card-header text-center" style="background-color:#2f5d3b;">
                <h5 class="text-white mb-0">🔐 Login to EstateDB</h5>
            </div>

            <div class="card-body">

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} py-2">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button type="submit" class="btn w-100 text-white" 
                            style="background-color:#2f5d3b;">
                        Login
                    </button>
                </form>

                <div class="text-center mt-3">
                    <small>
                        Don’t have an account?  
                        <a href="/accounts/register/" class="text-success fw-bold">Register</a>
                    </small>
                </div>

            </div>
        </div>

    </div>
</div>

{% endblock %}
