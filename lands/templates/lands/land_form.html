{% extends "base.html" %}

{% block content %}
<h3>{{ title }}</h3>

<form method="post">
    {% csrf_token %}
    {% for field in form %}
        <div class="mb-3">
            {{ field.label_tag }} 
            {{ field }}
            {% if field.errors %}
                <div class="text-danger">{{ field.errors }}</div>
            {% endif %}
        </div>
    {% endfor %}
    <button type="submit" class="btn btn-success">Save</button>
    <a href="{% url 'lands:land_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
